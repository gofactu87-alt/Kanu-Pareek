<!DOCTYPE html>
<html>
<head>
<title>Buy Zoxa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#f1f3f6;}
header {background:#131921;color:white;padding:15px;text-align:center;font-size:22px;}
.products {display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px;}
.card {background:white;padding:10px;border-radius:8px;transition:0.3s;}
.card:hover {transform:scale(1.05);}
.card img {width:100%;height:200px;object-fit:cover;}
button {background:#ff9900;border:none;padding:10px;width:100%;cursor:pointer;}
button:hover {background:#e68a00;}
.form {display:none;background:white;padding:20px;margin:20px;border-radius:10px;}
</style>
</head>

<body>

<header>🛒 Buy Zoxa</header>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Stylish T-Shirt</h3>
<p>₹499</p>
<button onclick="buy('T-Shirt')">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Running Shoes</h3>
<p>₹999</p>
<button onclick="buy('Shoes')">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552">
<h3>Watch</h3>
<p>₹799</p>
<button onclick="buy('Watch')">Buy Now</button>
</div>

</div>

<div class="form" id="form">
<h2>Enter Details</h2>
<input type="text" placeholder="Name"><br><br>
<input type="text" placeholder="Phone"><br><br>
<input type="text" placeholder="Address"><br><br>
<button onclick="alert('Order Received!')">Submit</button>
</div>

<script>
function buy(){
  document.getElementById("form").style.display="block";
}
</script>

</body>
</html>
