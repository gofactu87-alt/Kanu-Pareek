<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My E-Commerce Store</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

button {
  background: black;
  color: white;
  padding: 10px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

.form-section {
  padding: 20px;
  background: white;
  margin: 20px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}
</style>
</head>

<body>

<header>🛒 My E-Commerce Store</header>

<section class="products">
  <div class="card">
    <img src="https://via.placeholder.com/300">
    <h3>T-Shirt</h3>
    <p>₹499</p>
    <button onclick="orderProduct('T-Shirt')">Order Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <h3>Shoes</h3>
    <p>₹999</p>
    <button onclick="orderProduct('Shoes')">Order Now</button>
  </div>
</section>

<section class="form-section" id="formSection" style="display:none;">
  <h2>Enter Your Details</h2>
  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="phone" placeholder="Phone Number">
  <input type="text" id="address" placeholder="Address">
  <button onclick="submitOrder()">Submit Order</button>
</section>

<script>
let selectedProduct = "";

function orderProduct(product) {
  selectedProduct = product;
  document.getElementById("formSection").style.display = "block";
}

function submitOrder() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if(name && phone && address){
    alert("Order Received! We will contact you soon.");
  } else {
    alert("Please fill all details!");
  }
}
</script>

</body>
</html>
